<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTech CSE · Complete Learning Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="bg-canvas"></div>

    <div id="app">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">BTech CSE</div>
                <div class="sub">Complete Learning Hub</div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-view="dashboard"><i class="fas fa-th-large"></i> Dashboard</button>
                <button class="nav-btn" data-view="syllabus"><i class="fas fa-book-open"></i> Syllabus</button>
            </nav>
            <div class="sidebar-semesters" id="semesterList">
                <div class="label"><i class="fas fa-layer-group"></i> Semesters</div>
            </div>
            <div class="sidebar-user">
                <div class="avatar" id="userAvatar">S</div>
                <div class="user-info">
                    <div class="name" id="userName">Student</div>
                    <div class="email" id="userEmail">student@cse.edu</div>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="topbar">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="search-wrap">
                    <i class="fas fa-search"></i>
                    <input type="text" id="globalSearch" placeholder="Search topics, subjects..." />
                    <div class="search-dropdown" id="searchDropdown"></div>
                </div>
                <div class="right-actions">
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span>Theme</span></button>
                </div>
            </header>
            <div class="page-content" id="pageContent"></div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
