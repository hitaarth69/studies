<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTech CSE · Complete Learning Hub</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- CodeMirror for Lab -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <!-- Skulpt for Python execution -->
    <script src="https://skulpt.org/js/skulpt.min.js"></script>
    <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0b1120;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #2d3b52;
            --bg-input: #2d3b52;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-dark: #0ea5e9;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --border: #334155;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html,
        body {
            height: 100%;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            transition: background var(--transition), color var(--transition);
            overflow-x: hidden;
        }
        /* ── Unique animated background ── */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(56, 189, 248, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            background-size: 100% 100%;
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 15s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 1;
            }
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(56, 189, 248, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 8px;
        }

        /* ── Loading Screen ── */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loading.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loading .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--bg-secondary);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loading h2 {
            margin-top: 20px;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: -0.5px;
        }
        #loading p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ── Login Modal ── */
        #loginModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #loginModal.active {
            display: flex;
        }
        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .login-box h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .login-box p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-box .field {
            margin-bottom: 16px;
        }
        .login-box label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            transition: border var(--transition);
        }
        .login-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .login-box .btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #0b1120;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            cursor: pointer;
            transition: background var(--transition);
        }
        .login-box .btn:hover {
            background: var(--accent-dark);
        }
        .login-box .error {
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        /* ── App Layout ── */
        .app {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        .app.show {
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
            transition: transform var(--transition);
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar .logo .icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #0b1120;
        }
        .sidebar .logo h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .sidebar .logo h1 span {
            color: var(--accent);
        }
        .sidebar .logo .sub {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            display: block;
        }

        .sidebar .nav-section {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 20px 0 8px 4px;
        }
        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .sidebar .nav-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }
        .sidebar .nav-item.active {
            background: var(--accent-glow);
            color: var(--accent);
        }
        .sidebar .nav-item .badge {
            margin-left: auto;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .sidebar .nav-item.active .badge {
            background: var(--accent);
            color: #0b1120;
        }
        .sidebar .user-section {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar .user-section .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0b1120;
            font-size: 14px;
            flex-shrink: 0;
        }
        .sidebar .user-section .info {
            flex: 1;
            min-width: 0;
        }
        .sidebar .user-section .info .name {
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar .user-section .info .email {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar .user-section .logout {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            transition: color var(--transition);
            padding: 4px;
        }
        .sidebar .user-section .logout:hover {
            color: #f87171;
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            padding: 24px 32px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        /* ── Top Bar ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .topbar .search-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .topbar .search-wrap input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            transition: border var(--transition);
        }
        .topbar .search-wrap input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .topbar .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .topbar .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 20;
        }
        .topbar .search-results.show {
            display: block;
        }
        .topbar .search-results .result-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }
        .topbar .search-results .result-item:hover {
            background: var(--bg-card-hover);
        }
        .topbar .search-results .result-item .sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .topbar .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar .actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            transition: color var(--transition);
            padding: 4px;
        }
        .topbar .actions button:hover {
            color: var(--text-primary);
        }
        .topbar .actions .theme-toggle {
            font-size: 20px;
        }

        /* ── Breadcrumb ── */
        .breadcrumb {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .breadcrumb .sep {
            color: var(--border);
        }
        .breadcrumb .current {
            color: var(--text-secondary);
        }

        /* ── Progress Bar ── */
        .progress-global {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 12px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .progress-global .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .progress-global .bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 20px;
            overflow: hidden;
            min-width: 100px;
        }
        .progress-global .bar-wrap .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 20px;
            width: 0%;
            transition: width 0.4s ease;
        }
        .progress-global .percent {
            font-weight: 700;
            font-size: 14px;
            color: var(--accent);
            min-width: 44px;
            text-align: right;
        }
        .progress-global .resume-btn {
            background: var(--accent);
            color: #0b1120;
            border: none;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background var(--transition);
            display: none;
        }
        .progress-global .resume-btn:hover {
            background: var(--accent-dark);
        }
        .progress-global .resume-btn.show {
            display: block;
        }

        /* ── Semester / Subject Grid ── */
        .semester-header {
            margin-bottom: 20px;
        }
        .semester-header h2 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .semester-header p {
            color: var(--text-secondary);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .subject-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: var(--transition);
            cursor: pointer;
        }
        .subject-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        .subject-card .code {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 2px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .subject-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subject-card .desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
        }
        .subject-card .meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            align-items: center;
        }

        /* ── Topic Detail View ── */
        .topic-detail {
            animation: fadeInUp 0.3s ease;
        }
        .topic-detail .hero {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 24px;
        }
        .topic-detail .hero .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .topic-detail .hero .meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .topic-detail .hero h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .topic-detail .hero .sub {
            color: var(--text-secondary);
            font-size: 16px;
        }
        .topic-detail .hero .actions {
            margin-top: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .topic-detail .hero .actions button {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        .topic-detail .hero .actions .complete-btn {
            background: var(--accent);
            color: #0b1120;
        }
        .topic-detail .hero .actions .complete-btn:hover {
            background: var(--accent-dark);
        }
        .topic-detail .hero .actions .complete-btn.done {
            background: #10b981;
        }
        .topic-detail .hero .actions .bookmark-btn {
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .topic-detail .hero .actions .bookmark-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .topic-detail .content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 24px;
        }
        .topic-detail .content h3 {
            font-size: 20px;
            font-weight: 700;
            margin-top: 24px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .topic-detail .content h3:first-child {
            margin-top: 0;
        }
        .topic-detail .content h3 i {
            color: var(--accent);
            font-size: 18px;
        }
        .topic-detail .content p {
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-size: 15px;
        }
        .topic-detail .content ul,
        .topic-detail .content ol {
            margin-left: 24px;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        .topic-detail .content .key-point {
            background: var(--bg-primary);
            border-left: 4px solid var(--accent);
            padding: 14px 20px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-bottom: 14px;
        }
        .topic-detail .content .key-point strong {
            color: var(--text-primary);
        }
        .topic-detail .content .code-block {
            background: #0d1117;
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            overflow-x: auto;
            margin-bottom: 14px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #e6edf3;
        }
        .topic-detail .content .code-block .comment {
            color: #8b949e;
        }
        .topic-detail .content .code-block .keyword {
            color: #ff7b72;
        }
        .topic-detail .content .code-block .string {
            color: #a5d6ff;
        }
        .topic-detail .content .code-block .func {
            color: #d2a8ff;
        }
        .topic-detail .content .code-block .number {
            color: #79c0ff;
        }

        .topic-detail .content .youtube-embed {
            margin: 16px 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        .topic-detail .content .youtube-embed iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .topic-detail .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .topic-detail .nav-buttons button {
            padding: 10px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .topic-detail .nav-buttons button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .topic-detail .nav-buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Lab Section ── */
        .lab-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }
        .lab-container .lang-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .lab-container .lang-tabs button {
            padding: 6px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);

        function toggleTopicComplete(semIdx, subIdx, topicIdx) {
            const id = getTopicId(semIdx, subIdx, topicIdx);
            progress[id] = !progress[id];
            localStorage.setItem('cse_progress', JSON.stringify(progress));
            updateProgressUI();
        }

        function isBookmarked(semIdx, subIdx, topicIdx) {
            return bookmarks.some(b => b.semIdx === semIdx && b.subIdx === subIdx && b.topicIdx === topicIdx);
        }

        function toggleBookmark(semIdx, subIdx, topicIdx) {
            const idx = bookmarks.findIndex(b => b.semIdx === semIdx && b.subIdx === subIdx && b.topicIdx === topicIdx);
            if (idx > -1) bookmarks.splice(idx, 1);
            else bookmarks.push({ semIdx, subIdx, topicIdx });
            localStorage.setItem('cse_bookmarks', JSON.stringify(bookmarks));
            renderCurrentView();
        }

        function updateProgressUI() {
            const percent = getProgressPercent();
            const bar = document.querySelector('.progress-global .fill');
            const percentEl = document.querySelector('.progress-global .percent');
            if (bar) bar.style.width = percent + '%';
            if (percentEl) percentEl.textContent = percent + '%';
            // Update resume button
            const resumeBtn = document.querySelector('.progress-global .resume-btn');
            if (resumeBtn) {
                if (lastRead) resumeBtn.classList.add('show');
                else resumeBtn.classList.remove('show');
            }
        }

        function getLastReadTopic() {
            if (!lastRead) return null;
            const parts = lastRead.split('-');
            if (parts.length !== 3) return null;
            const semIdx = parseInt(parts[0].replace('s', ''));
            const subIdx = parseInt(parts[1].replace('sub', ''));
            const topicIdx = parseInt(parts[2].replace('t', ''));
            if (isNaN(semIdx) || isNaN(subIdx) || isNaN(topicIdx)) return null;
            return { semIdx, subIdx, topicIdx };
        }

        function setLastRead(semIdx, subIdx, topicIdx) {
            lastRead = getTopicId(semIdx, subIdx, topicIdx);
            localStorage.setItem('cse_lastRead', lastRead);
        }

        function getAllTopicsFlat() {
            const flat = [];
            syllabusData.forEach((sem, si) => {
                sem.subjects.forEach((sub, su) => {
                    sub.topics.forEach((topic, ti) => {
                        flat.push({
                            semIdx: si,
                            subIdx: su,
                            topicIdx: ti,
                            semester: sem.semester,
                            subject: sub.name,
                            code: sub.code,
                            title: topic.title
                        });
                    });
                });
            });
            return flat;
        }

        function findTopicIndex(semIdx, subIdx, topicIdx) {
            const flat = getAllTopicsFlat();
            return flat.findIndex(t => t.semIdx === semIdx && t.subIdx === subIdx && t.topicIdx === topicIdx);
        }

        function getTopicByIndex(index) {
            const flat = getAllTopicsFlat();
            return flat[index] || null;
        }

        // ── Expose to global for onclick ──
        window.toggleTopicComplete = toggleTopicComplete;
        window.toggleBookmark = toggleBookmark;
        window.navigateTopic = navigateTopic;
        window.navigateTo = navigateTo;
        window.resumeLast = resumeLast;
        window.switchLabLang = switchLabLang;
        window.runLabCode = runLabCode;

        // ════════════════════════════════════════════════════════════════
        //  RENDER FUNCTIONS
        // ════════════════════════════════════════════════════════════════

        function renderSidebarSemesters() {
            const container = document.getElementById('semesterNav');
            if (!container) return;
            container.innerHTML = syllabusData.map((s, i) => `
                <button class="nav-item ${currentView === 'semester' && currentSemesterIdx === i ? 'active' : ''}" data-view="semester" data-semester="${i}">
                    <i class="fas fa-${currentView === 'semester' && currentSemesterIdx === i ? 'book-open' : 'book'}"></i>
                    Semester ${s.semester}
                    <span class="badge">${s.subjects.length}</span>
                </button>
            `).join('');
            container.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const view = btn.dataset.view;
                    if (view === 'semester') {
                        currentSemesterIdx = parseInt(btn.dataset.semester);
                        currentView = 'semester';
                        renderCurrentView();
                        closeMobile();
                    }
                });
            });
        }

        function renderTopbar() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            // Remove old listeners by cloning
            const newInput = searchInput.cloneNode(true);
            searchInput.parentNode.replaceChild(newInput, searchInput);
            const newSearchInput = document.getElementById('searchInput');
            newSearchInput.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase();
                const results = document.getElementById('searchResults');
                if (!results) return;
                if (query.length < 2) { results.classList.remove('show'); return; }
                const flat = getAllTopicsFlat();
                const matches = flat.filter(t => t.title.toLowerCase().includes(query) || t.subject.toLowerCase()
                .includes(query));
                if (matches.length === 0) {
                    results.innerHTML = '<div class="result-item">No results found</div>';
                } else {
                    results.innerHTML = matches.slice(0, 10).map(t => `
                        <div class="result-item" data-sem="${t.semIdx}" data-sub="${t.subIdx}" data-topic="${t.topicIdx}">
                            <div>${t.title}</div>
                            <div class="sub">${t.code} · Semester ${t.semester}</div>
                        </div>
                    `).join('');
                    results.querySelectorAll('.result-item[data-sem]').forEach(el => {
                        el.addEventListener('click', () => {
                            const sem = parseInt(el.dataset.sem);
                            const sub = parseInt(el.dataset.sub);
                            const topic = parseInt(el.dataset.topic);
                            currentSemesterIdx = sem;
                            currentSubjectIdx = sub;
                            currentTopicIdx = topic;
                            currentView = 'topic';
                            renderCurrentView();
                            results.classList.remove('show');
                            newSearchInput.value = '';
                        });
                    });
                }
                results.classList.add('show');
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrap')) {
                    document.getElementById('searchResults')?.classList.remove('show');
                }
            });
        }

        function renderCurrentView() {
            const main = document.getElementById('mainContent');
            if (!main) return;

            // Build progress HTML
            let progressHTML = `
                <div class="progress-global">
                    <span class="label"><i class="fas fa-chart-simple"></i> Progress</span>
                    <div class="bar-wrap"><div class="fill" style="width:${getProgressPercent()}%"></div></div>
                    <span class="percent">${getProgressPercent()}%</span>
                    <button class="resume-btn ${lastRead ? 'show' : ''}" id="resumeBtn"><i class="fas fa-play"></i> Resume</button>
                </div>
            `;

            let content = '';

            try {
                if (currentView === 'dashboard') {
                    content = renderDashboard();
                } else if (currentView === 'semesters') {
                    content = renderSemesterList();
                } else if (currentView === 'semester') {
                    content = renderSemester(currentSemesterIdx);
                } else if (currentView === 'topic') {
                    content = renderTopic(currentSemesterIdx, currentSubjectIdx, currentTopicIdx);
                } else if (currentView === 'lab') {
                    content = renderLab();
                } else {
                    content = renderDashboard();
                }
            } catch (e) {
                console.error('Render error:', e);
                content = `<div style="padding:40px;text-align:center;color:var(--text-secondary);">
                    <i class="fas fa-exclamation-triangle" style="font-size:40px;"></i>
                    <h3>Something went wrong</h3>
                    <p>Please try refreshing the page.</p>
                </div>`;
            }

            main.innerHTML = progressHTML + content;

            // Attach resume button
            const resumeBtn = document.getElementById('resumeBtn');
            if (resumeBtn) {
                resumeBtn.addEventListener('click', () => {
                    const last = getLastReadTopic();
                    if (last) {
                        currentSemesterIdx = last.semIdx;
                        currentSubjectIdx = last.subIdx;
                        currentTopicIdx = last.topicIdx;
                        currentView = 'topic';
                        renderCurrentView();
                    }
                });
            }

            // Update progress bar
            updateProgressUI();

            // Update sidebar active state
            document.querySelectorAll('.sidebar .nav-item[data-view]').forEach(item => {
                item.classList.toggle('active', item.dataset.view === currentView);
            });
            renderSidebarSemesters();

            // Update theme
            document.body.classList.toggle('light', theme === 'light');

            if (currentView === 'lab') {
                setTimeout(initLabEditor, 100);
            }

            const total = getTotalTopics();

                if (bmTopics.length > 0) {
                    bookmarksHTML = bmTopics.map(t => `

                                <div class="title">${t.title}</div>
                                <div class="sub">${t.code} · Semester ${t.sem}</div>

                <div class="dashboard-stats">

                    <div class="stat"><div class="number">${completed}</div><div class="label">Completed</div></div>
                    <div class="stat"><div class="number">${getProgressPercent()}%</div><div class="label">Progress</div></div>
                    <div class="stat"><div class="number">${bookmarks.length}</div><div class="label">Bookmarks</div></div>
                </div>
                <div class="dashboard-recent">

                    ${lastTopicHTML || '<p style="color:var(--text-muted);">No recent topic. Start exploring the syllabus!</p>'}
                </div>

                <div class="dashboard-recent" style="margin-top:16px;">
                    <h3><i class="fas fa-bookmark"></i> Your Bookmarks</h3>
                    ${bookmarksHTML}
                </div>
                ` : ''}
                <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap;">
                    <button class="nav-item" style="background:var(--accent);color:#0b1120;padding:10px 24px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:600;" onclick="navigateTo('semesters')">📚 Browse Syllabus</button>
                    <button class="nav-item" style="background:var(--bg-card);color:var(--text-primary);padding:10px 24px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-weight:600;" onclick="navigateTo('lab')">🧪 Go to Lab</button>

            const last = getLastReadTopic();
            if (last) {

                currentTopicIdx = last.topicIdx;

                renderCurrentView();

        // ── Subject View (list topics) ──
        // When clicking a subject card, we show topics as a list

        // ── Topic Detail ──
        function renderTopic(semIdx, subIdx, topicIdx) {
            const sem = syllabusData[semIdx];
            if (!sem) return renderSemesterList();
            const sub = sem.subjects[subIdx];
            if (!sub) return renderSemester(semIdx);
            const topic = sub.topics[topicIdx];
            if (!topic) return renderSemester(semIdx);

            const completed = isTopicCompleted(semIdx, subIdx, topicIdx);
            const bookmarked = isBookmarked(semIdx, subIdx, topicIdx);
            const flat = getAllTopicsFlat();
            const currentIndex = findTopicIndex(semIdx, subIdx, topicIdx);
            const total = flat.length;

            setLastRead(semIdx, subIdx, topicIdx);

            let youtubeHTML = '';
            if (topic.youtube && topic.youtube.length) {
                youtubeHTML = topic.youtube.map(url => `
                    <div class="youtube-embed">
                        <iframe src="${url}" allowfullscreen loading="lazy"></iframe>
                    </div>
                `).join('');
            }

            return `
                <div class="topic-detail">
                    <div class="breadcrumb">
                        <a onclick="currentView='semesters';renderCurrentView();">📚 All Semesters</a>
                        <span class="sep">›</span>
                        <a onclick="currentSemesterIdx=${semIdx};currentView='semester';renderCurrentView();">Semester ${sem.semester}</a>
                        <span class="sep">›</span>
                        <span class="current">${topic.title}</span>
                    </div>

                    <div class="hero">
                        <div class="meta">
                            <span><i class="fas fa-book"></i> ${sub.code}</span>
                            <span><i class="fas fa-graduation-cap"></i> Semester ${sem.semester}</span>
                            <span><i class="fas fa-tag"></i> ${sub.name}</span>
                        </div>
                        <h2>${topic.title}</h2>
                        <div class="sub">${sub.name} · ${sub.code}</div>
                        <div class="actions">
                            <button class="complete-btn ${completed ? 'done' : ''}" onclick="toggleTopicComplete(${semIdx}, ${subIdx}, ${topicIdx});renderCurrentView();">
                                <i class="fas ${completed ? 'fa-check-circle' : 'fa-circle'}"></i> ${completed ? 'Completed' : 'Mark Complete'}
                            </button>
                            <button class="bookmark-btn" onclick="toggleBookmark(${semIdx}, ${subIdx}, ${topicIdx});renderCurrentView();">
                                <i class="fas ${bookmarked ? 'fa-bookmark' : 'fa-bookmark-o'}"></i> ${bookmarked ? 'Bookmarked' : 'Bookmark'}
                            </button>
                        </div>
                    </div>

                    <div class="content">
                        <h3><i class="fas fa-bullseye"></i> Learning Objectives</h3>
                        <ul>${topic.objectives.map(o => `<li>${o}</li>`).join('')}</ul>

                        ${topic.content}

                        <h3><i class="fas fa-key"></i> Key Takeaways</h3>
                        <ul>${topic.takeaways.map(t => `<li>${t}</li>`).join('')}</ul>

                        <h3><i class="fas fa-question-circle"></i> Practice Questions</h3>
                        <ul>${topic.practice.map(q => `<li>${q}</li>`).join('')}</ul>

                        ${youtubeHTML ? `<h3><i class="fab fa-youtube"></i> Watch & Learn</h3>${youtubeHTML}` : ''}
                    </div>

                    <div class="nav-buttons">
                        <button ${currentIndex <= 0 ? 'disabled' : ''} onclick="navigateTopic(${currentIndex - 1})"><i class="fas fa-chevron-left"></i> Previous</button>
                        <button onclick="currentView='semester';currentSemesterIdx=${semIdx};renderCurrentView();"><i class="fas fa-th-list"></i> Back to Semester</button>
                        <button ${currentIndex >= total - 1 ? 'disabled' : ''} onclick="navigateTopic(${currentIndex + 1})">Next <i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            `;
        }

        function navigateTopic(index) {
            const flat = getAllTopicsFlat();
            const topic = flat[index];
            if (topic) {
                currentSemesterIdx = topic.semIdx;
                currentSubjectIdx = topic.subIdx;
                currentTopicIdx = topic.topicIdx;
                currentView = 'topic';
                renderCurrentView();
            }
        }

        // ── Lab ──
        let labEditor = null;
        let currentLabLang = 'python';

        function renderLab() {
            const langOptions = ['python', 'c', 'cpp', 'java', 'javascript'];
            const langNames = { python: 'Python', c: 'C', cpp: 'C++', java: 'Java', javascript: 'JavaScript' };
            const defaultCode = {
                python: 'print("Hello, World!")',
                c: '#include <stdio.h>\nint main() {\n    printf("Hello, World!\\n");\n    return 0;\n}',
                cpp: '#include <iostream>\nusing namespace std;\nint main() {\n    cout << "Hello, World!" << endl;\n    return 0;\n}',
                java: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, World!");\n    }\n}',
                javascript: 'console.log("Hello, World!");'
            };

            // We need to init CodeMirror after render
            setTimeout(() => initLabEditor(), 50);

            return `
                <div class="lab-container">
                    <h2><i class="fas fa-flask"></i> Coding Lab</h2>
                    <p style="color:var(--text-secondary);margin-bottom:16px;">Write and run code in multiple languages. Python runs in-browser; others will open in an external compiler.</p>
                    <div class="lang-tabs">
                        ${langOptions.map(lang => `
                            <button class="${lang === currentLabLang ? 'active' : ''}" data-lang="${lang}" onclick="switchLabLang('${lang}')">${langNames[lang]}</button>
                        `).join('')}
                    </div>
                    <div class="editor-wrap">
                        <textarea id="labEditor"></textarea>
                    </div>
                    <div class="output" id="labOutput">// Output will appear here</div>
                    <button class="run-btn" onclick="runLabCode()"><i class="fas fa-play"></i> Run</button>
                </div>
            `;
        }

        function initLabEditor() {
            const textarea = document.getElementById('labEditor');
            if (!textarea) return;
            if (labEditor) {
                labEditor.setValue(getDefaultCode(currentLabLang));
                labEditor.setOption('mode', getEditorMode(currentLabLang));
                return;
            }
            labEditor = CodeMirror.fromTextArea(textarea, {
                lineNumbers: true,
                mode: getEditorMode(currentLabLang),
                theme: 'dracula',
                tabSize: 4,
                indentUnit: 4,
                lineWrapping: true,
            });
            labEditor.setValue(getDefaultCode(currentLabLang));
        }

        function getDefaultCode(lang) {
            const codes = {
                python: 'print("Hello, World!")',
                c: '#include <stdio.h>\nint main() {\n    printf("Hello, World!\\n");\n    return 0;\n}',
                cpp: '#include <iostream>\nusing namespace std;\nint main() {\n    cout << "Hello, World!" << endl;\n    return 0;\n}',
                java: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, World!");\n    }\n}',
                javascript: 'console.log("Hello, World!");'
            };
            return codes[lang] || codes.python;
        }

        function getEditorMode(lang) {
            const modes = {
                python: 'python',
                c: 'text/x-csrc',
                cpp: 'text/x-c++src',
                java: 'text/x-java',
                javascript: 'javascript'
            };
            return modes[lang] || 'python';
        }

        function switchLabLang(lang) {
            currentLabLang = lang;
            if (labEditor) {
                labEditor.setValue(getDefaultCode(lang));
                labEditor.setOption('mode', getEditorMode(lang));
            }
            renderCurrentView();
        }

        function runLabCode() {
            if (!labEditor) return;
            const code = labEditor.getValue();
            const output = document.getElementById('labOutput');
            if (!output) return;

            if (currentLabLang === 'python') {
                output.textContent = 'Running...';
                try {
                    Sk.misceval.asyncToPromise(function() {
                        return Sk.importMainWithBody("<stdin>", false, code, true);
                    }).then(function(mod) {
                        output.textContent = '✔ Execution finished.';
                    }, function(err) {
                        output.textContent = 'Error: ' + err.toString();
                    });
                } catch (e) {
                    output.textContent = 'Error: ' + e.toString();
                }
            } else if (currentLabLang === 'javascript') {
                try {
                    const result = eval(code);
                    output.textContent = result !== undefined ? String(result) : '✔ Executed successfully.';
                } catch (e) {
                    output.textContent = 'Error: ' + e.message;
                }
            } else {
                const urls = {
                    c: 'https://www.onlinegdb.com/online_c_compiler',
                    cpp: 'https://www.onlinegdb.com/online_c++_compiler',
                    java: 'https://www.onlinegdb.com/online_java_compiler'
                };
                const url = urls[currentLabLang] || 'https://www.onlinegdb.com/';
                window.open(url, '_blank');
                output.textContent = 'Opened external compiler for ' + currentLabLang.toUpperCase() +
                    '. Paste your code there.';
            }
        }

        // ════════════════════════════════════════════════════════════════
        //  INIT — Guaranteed loading screen hide
        // ════════════════════════════════════════════════════════════════

        function initApp() {
            // First, ensure loading screen is visible
            const loading = document.getElementById('loading');
            loading.classList.remove('hide');

            // Check login state
            const user = localStorage.getItem('cse_user');
            if (user) {
                try {
                    currentUser = JSON.parse(user);
                } catch (e) {
                    currentUser = null;
                }
            }

            if (!currentUser) {
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('app').classList.remove('show');
                // Hide loading after login screen shows
                setTimeout(() => loading.classList.add('hide'), 800);
                setupLogin();
                return;
            }

            // User is logged in, show app
            document.getElementById('app').classList.add('show');
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('userName').textContent = currentUser.name || 'Student';
            document.getElementById('userEmail').textContent = currentUser.email || 'student@cse.edu';
            document.getElementById('userAvatar').textContent = currentUser.name ? currentUser.name[0].toUpperCase() : 'S';

            // Setup theme
            if (theme === 'light') document.body.classList.add('light');

            // Setup logout
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('cse_user');
                currentUser = null;
                document.getElementById('app').classList.remove('show');
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('loginUser').value = '';
                document.getElementById('loginPass').value = '';
                document.getElementById('loginError').style.display = 'none';
                loading.classList.remove('hide');
                setTimeout(() => loading.classList.add('hide'), 500);
                setupLogin();
            });

            // Setup sidebar navigation
            document.querySelectorAll('.sidebar .nav-item[data-view]').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    if (view === 'dashboard') { currentView = 'dashboard';
                        renderCurrentView(); }
                    if (view === 'semesters') { currentView = 'semesters';
                        renderCurrentView(); }
                    if (view === 'lab') { currentView = 'lab';
                        renderCurrentView(); }
                    closeMobile();
                });
            });

            // Theme toggle
            document.querySelector('.theme-toggle')?.addEventListener('click', () => {
                theme = theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('cse_theme', theme);
                document.body.classList.toggle('light', theme === 'light');
            });

            // Mobile toggle
            document.getElementById('mobileToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });

            // Close sidebar on outside click
            document.addEventListener('click', (e) => {
                const sidebar = document.getElementById('sidebar');
                const toggle = document.getElementById('mobileToggle');
                if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
                    closeMobile();
                }
            });

            // Determine initial view
            const last = getLastReadTopic();
            if (last && last.semIdx < syllabusData.length && last.subIdx < syllabusData[last.semIdx].subjects.length &&
                last.topicIdx < syllabusData[last.semIdx].subjects[last.subIdx].topics.length) {
                currentView = 'topic';
                currentSemesterIdx = last.semIdx;
                currentSubjectIdx = last.subIdx;
                currentTopicIdx = last.topicIdx;
            } else {
                currentView = 'dashboard';
            }

            // Render everything
            renderTopbar();
            renderSidebarSemesters();
            renderCurrentView();

            // FINALLY — hide loading screen after everything is rendered
            setTimeout(() => {
                loading.classList.add('hide');
            }, 400);

            appReady = true;
        }

        function setupLogin() {
            document.getElementById('loginBtn').addEventListener('click', () => {
                const user = document.getElementById('loginUser').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                if (user === 'student' && pass === 'cse2025') {
                    const userObj = { name: 'Student', email: 'student@cse.edu' };
                    localStorage.setItem('cse_user', JSON.stringify(userObj));
                    currentUser = userObj;
                    document.getElementById('loginModal').classList.remove('active');
                    document.getElementById('app').classList.add('show');
                    document.getElementById('userName').textContent = userObj.name;
                    document.getElementById('userEmail').textContent = userObj.email;
                    document.getElementById('userAvatar').textContent = userObj.name[0].toUpperCase();
                    document.getElementById('loginError').style.display = 'none';
                    // Re-init app
                    const loading = document.getElementById('loading');
                    loading.classList.remove('hide');
                    setTimeout(() => {
                        initApp();
                    }, 300);
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            });

            // Enter key support
            document.getElementById('loginPass').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            });
            document.getElementById('loginUser').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            });
        }

        function closeMobile() {
            document.getElementById('sidebar').classList.remove('open');
        }

        // ── Start the app ──
        window.addEventListener('load', function() {
            // Small delay to ensure everything is loaded
            setTimeout(initApp, 200);
        });

        // Fallback: if loading screen is still visible after 5s, force hide
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (loading && !loading.classList.contains('hide')) {
                loading.classList.add('hide');
            }
        }, 5000);

        console.log('🚀 BTech CSE Complete Learning Hub loaded.');
        console.log('📚 Total topics:', getTotalTopics());
        console.log('💡 Tip: Use the search bar to find any topic quickly.');
    </script>
</body>
</html>
